<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Латышский тренажёр — Вход</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a3a6e 0%, #9b2335 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-box {
            background: white;
            border-radius: 20px;
            padding: 32px 28px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .logo { text-align: center; margin-bottom: 22px; }
        .logo .flag { font-size: 48px; margin-bottom: 6px; }
        .logo h1 { font-size: 21px; color: #2c3e50; }

        /* ── ВКЛАДКИ ── */
        .tabs {
            display: flex;
            background: #f0f2f5;
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 22px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            font-size: 15px;
            border: none;
            border-radius: 9px;
            cursor: pointer;
            background: none;
            color: #888;
            font-weight: bold;
            transition: all 0.2s;
        }

        .tab.active {
            background: white;
            color: #1a3a6e;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        /* ── ПОЛЯ ── */
        label {
            display: block;
            font-size: 14px;
            color: #555;
            margin-bottom: 5px;
            margin-top: 16px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 13px 16px;
            font-size: 17px;
            border: 2px solid #ddd;
            border-radius: 12px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #3498db; }

        #login-code {
            font-size: 30px;
            letter-spacing: 10px;
            text-align: center;
            font-weight: bold;
        }

        /* ── КНОПКИ ── */
        .btn-main {
            width: 100%;
            padding: 15px;
            font-size: 19px;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 22px;
            font-weight: bold;
            transition: opacity 0.2s, transform 0.1s;
        }
        .btn-main:active   { transform: scale(0.98); }
        .btn-main:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-register { background: #27ae60; }
        .btn-login-go { background: #1a3a6e; }

        /* ── СООБЩЕНИЯ ── */
        .msg {
            display: none;
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 14px;
            margin-top: 14px;
            line-height: 1.6;
            text-align: center;
        }
        .msg-error   { background: #fdecea; border: 1px solid #e74c3c; color: #c0392b; }
        .msg-success { background: #eafaf1; border: 1px solid #27ae60; color: #1e8449; }
        .msg-info    { background: #eaf4fb; border: 1px solid #3498db; color: #1a5276; }

        /* ── ЭКРАН УСПЕШНОЙ РЕГИСТРАЦИИ ── */
        #success-screen { display: none; text-align: center; }

        .code-display {
            font-size: 56px;
            font-weight: bold;
            letter-spacing: 14px;
            color: #1a3a6e;
            background: #eaf4fb;
            border-radius: 16px;
            padding: 20px 10px;
            margin: 16px 0;
        }

        .success-title { font-size: 20px; color: #2c3e50; font-weight: bold; margin-bottom: 8px; }
        .success-sub   { font-size: 14px; color: #888; margin-bottom: 6px; line-height: 1.6; }

        .btn-go {
            width: 100%;
            padding: 15px;
            font-size: 19px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 18px;
            font-weight: bold;
        }

        .spinner { display:none; text-align:center; color:#888; font-size:14px; margin-top:10px; }

        .small-link {
            text-align: center;
            margin-top: 12px;
            font-size: 13px;
            color: #aaa;
        }
        .small-link a { color: #3498db; cursor: pointer; text-decoration: none; }
    </style>
</head>
<body>

<div class="login-box">

    <div class="logo">
        <div class="flag">🇱🇻</div>
        <h1>Латышский тренажёр</h1>
    </div>

    <!-- ── ВКЛАДКИ ── -->
    <div class="tabs" id="tabs">
        <button class="tab active" onclick="showTab('register')">Первый раз</button>
        <button class="tab"        onclick="showTab('login')">У меня есть код</button>
    </div>

    <!-- ── РЕГИСТРАЦИЯ ── -->
    <div id="tab-register">
        <label for="reg-name">Ваше имя</label>
        <input type="text" id="reg-name" placeholder="Например: Анна" autocomplete="name">

        <label for="reg-email">Ваш email</label>
        <input type="email" id="reg-email" placeholder="anna@mail.com">

        <button class="btn-main btn-register" id="btn-register" onclick="doRegister()">
            Получить бесплатный доступ →
        </button>
        <div class="spinner" id="reg-spinner">⏳ Создаю доступ...</div>
        <div class="msg msg-error"   id="reg-error"></div>
        <div class="msg msg-info"    id="reg-info"></div>
    </div>

    <!-- ── ВХОД ── -->
    <div id="tab-login" style="display:none">
        <label for="login-name">Ваше имя</label>
        <input type="text" id="login-name" placeholder="Например: Анна" autocomplete="name">

        <label for="login-code">Ваш код (4 цифры)</label>
        <input type="tel" id="login-code" placeholder="0000" maxlength="4" inputmode="numeric">

        <button class="btn-main btn-login-go" id="btn-login" onclick="doLogin()">
            Войти →
        </button>
        <div class="spinner" id="login-spinner">⏳ Проверяю...</div>
        <div class="msg msg-error" id="login-error"></div>

        <div class="small-link">Забыли код? <a onclick="showTab('register')">Зарегистрироваться заново</a></div>
    </div>

    <!-- ── ЭКРАН УСПЕХА ── -->
    <div id="success-screen">
        <div class="success-title">🎉 Добро пожаловать!</div>
        <div class="success-sub">Запишите или сделайте скриншот вашего кода:</div>
        <div class="code-display" id="code-display">0000</div>
        <div class="success-sub" id="success-sub">
            Доступ: <strong>1 неделя бесплатно</strong><br>
            Код также отправлен на ваш email
        </div>
        <button class="btn-go" onclick="goToTrainer()">Начать заниматься →</button>
    </div>

</div>

<script src="supabase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Если уже есть сессия — сразу в тренажёр
try {
    const s = JSON.parse(sessionStorage.getItem('lv_session') || 'null');
    if (s && s.userId) window.location.href = 'trenazer.html';
} catch(e) {}

// ── ВКЛАДКИ ────────────────────────────────────────
function showTab(tab) {
    document.getElementById('tab-register').style.display = tab === 'register' ? 'block' : 'none';
    document.getElementById('tab-login').style.display    = tab === 'login'    ? 'block' : 'none';
    document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', (tab === 'register' && i === 0) || (tab === 'login' && i === 1));
    });
}

// Enter
document.getElementById('reg-name').addEventListener('keydown',  e => { if (e.key==='Enter') document.getElementById('reg-email').focus(); });
document.getElementById('reg-email').addEventListener('keydown', e => { if (e.key==='Enter') doRegister(); });
document.getElementById('login-name').addEventListener('keydown',e => { if (e.key==='Enter') document.getElementById('login-code').focus(); });
document.getElementById('login-code').addEventListener('keydown',e => { if (e.key==='Enter') doLogin(); });
document.getElementById('login-code').addEventListener('input', function() {
    this.value = this.value.replace(/\D/g, '').slice(0, 4);
});

function generateCode() {
    return String(Math.floor(1000 + Math.random() * 9000));
}

// ── РЕГИСТРАЦИЯ ─────────────────────────────────────
async function doRegister() {
    const name  = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();

    if (!name)  { showMsg('reg-error', 'Введите ваше имя.'); return; }
    if (!email || !email.includes('@')) { showMsg('reg-error', 'Введите правильный email.'); return; }

    setLoading('reg', true);

    try {
        // Проверяем — есть ли уже такой email
        const { data: existing } = await db.from('users')
            .select('*').ilike('email', email).limit(1);

        if (existing && existing.length > 0) {
            const u = existing[0];
            const expired = u.access_expires && new Date(u.access_expires) < new Date();

            if (!expired) {
                // Активный аккаунт — отправляем на вкладку входа
                setLoading('reg', false);
                showMsg('reg-info',
                    `У вас уже есть доступ, ${u.name}! 🎉<br>
                    Перейдите на вкладку <strong>"У меня есть код"</strong> и войдите.`
                );
                if (u.email && RESEND_API_KEY) {
                    const exp = new Date(u.access_expires).toLocaleDateString('ru-RU', {day:'numeric',month:'long'});
                    await sendEmailCode(u.email, u.name, u.personal_code, exp);
                }
                return;
            } else {
                // Доступ истёк
                setLoading('reg', false);
                showMsg('reg-error',
                    `⏰ Ваша бесплатная неделя закончилась.<br><br>
                    Напишите комментарий на канале <strong>«Латышский язык +16»</strong>
                    чтобы стать спонсором и продолжить заниматься.`
                );
                return;
            }
        }

        // Новый пользователь — создаём
        const code    = generateCode();
        const expires = new Date(Date.now() + 7 * 24 * 60 * 60 * 1000);

        const { data: newUser, error } = await db.from('users').insert({
            name:           name,
            email:          email,
            type:           'subscriber',
            personal_code:  code,
            max_level:      1,
            access_expires: expires.toISOString(),
            first_access:   new Date().toISOString(),
            last_access:    new Date().toISOString(),
            sessions_count: 0
        }).select().single();

        if (error) throw new Error('Не удалось создать аккаунт. Попробуйте позже.');

        // Отправляем письмо если Resend настроен
        const expStr = expires.toLocaleDateString('ru-RU', {day:'numeric', month:'long', year:'numeric'});
        if (RESEND_API_KEY) await sendEmailCode(email, name, code, expStr);

        // Сохраняем сессию
        sessionStorage.setItem('lv_session', JSON.stringify({
            name: newUser.name, type: 'subscriber',
            userId: newUser.id, maxLevel: 1
        }));

        // Показываем экран с кодом
        setLoading('reg', false);
        document.getElementById('code-display').textContent = code;
        document.getElementById('success-sub').innerHTML =
            `Доступ: <strong>1 неделя бесплатно</strong><br>` +
            (RESEND_API_KEY ? `✉️ Код отправлен на ${email}` : `📋 Сохраните этот код!`);

        document.getElementById('tab-register').style.display = 'none';
        document.getElementById('tabs').style.display = 'none';
        document.getElementById('success-screen').style.display = 'block';

    } catch(err) {
        setLoading('reg', false);
        showMsg('reg-error', err.message);
    }
}

function goToTrainer() {
    window.location.href = 'trenazer.html';
}

// ── ВХОД ────────────────────────────────────────────
async function doLogin() {
    const name = document.getElementById('login-name').value.trim();
    const code = document.getElementById('login-code').value.trim();

    if (!name)           { showMsg('login-error', 'Введите ваше имя.'); return; }
    if (code.length!==4) { showMsg('login-error', 'Код должен быть 4 цифры.'); return; }

    setLoading('login', true);

    try {
        const { data: users, error } = await db.from('users')
            .select('*').ilike('name', name).eq('personal_code', code).limit(1);

        if (error) throw new Error('Ошибка подключения. Попробуйте позже.');

        if (!users || users.length === 0) {
            setLoading('login', false);
            showMsg('login-error', '❌ Неверное имя или код.<br>Проверьте данные из письма или зарегистрируйтесь заново.');
            return;
        }

        const user = users[0];

        if (user.access_expires && new Date(user.access_expires) < new Date()) {
            setLoading('login', false);
            showMsg('login-error',
                '⏰ Ваш доступ закончился.<br><br>' +
                'Напишите на канале <strong>«Латышский язык +16»</strong> чтобы продолжить.'
            );
            return;
        }

        await db.from('users').update({ last_access: new Date().toISOString() }).eq('id', user.id);

        sessionStorage.setItem('lv_session', JSON.stringify({
            name: user.name, type: user.type,
            userId: user.id, maxLevel: user.max_level || 1
        }));

        window.location.href = 'trenazer.html';

    } catch(err) {
        setLoading('login', false);
        showMsg('login-error', err.message);
    }
}

// ── ПИСЬМО ──────────────────────────────────────────
async function sendEmailCode(email, name, code, expiresStr) {
    try {
        const res = await fetch('https://api.resend.com/emails', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + RESEND_API_KEY },
            body: JSON.stringify({
                from: `${FROM_NAME} <${FROM_EMAIL}>`,
                to: [email],
                subject: 'Ваш код доступа к латышскому тренажёру',
                html: `
                    <div style="font-family:Arial,sans-serif;max-width:460px;margin:0 auto;padding:24px">
                        <h2 style="color:#1a3a6e">🇱🇻 Латышский тренажёр</h2>
                        <p>Привет, <strong>${name}</strong>!</p>
                        <p>Ваш личный код доступа:</p>
                        <div style="font-size:52px;font-weight:bold;letter-spacing:14px;color:#1a3a6e;
                                    background:#eaf4fb;border-radius:12px;padding:20px;text-align:center;margin:16px 0">
                            ${code}
                        </div>
                        <p>Доступ действует до: <strong>${expiresStr}</strong></p>
                        <p style="color:#888;font-size:13px;margin-top:16px">
                            Чтобы войти: введите ваше имя <strong>${name}</strong> и этот код.
                        </p>
                    </div>`
            })
        });
        return res.ok;
    } catch(e) { return false; }
}

// ── УТИЛИТЫ ─────────────────────────────────────────
function showMsg(id, html) {
    const el = document.getElementById(id);
    el.innerHTML = html;
    el.style.display = 'block';
}

function setLoading(which, on) {
    const btn = document.getElementById('btn-' + (which === 'reg' ? 'register' : 'login'));
    const sp  = document.getElementById(which + '-spinner');
    btn.disabled = on;
    sp.style.display = on ? 'block' : 'none';
    if (on) {
        document.getElementById(which + '-error').style.display = 'none';
        document.getElementById(which === 'reg' ? 'reg-info' : 'login-error').style.display = 'none';
    }
}
</script>
</body>
</html>
